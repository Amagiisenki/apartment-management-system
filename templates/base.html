<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Apartment System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">A</div>
                <div>
                    <div class="brand-title">Apartment Manager</div>
                    <div class="brand-subtitle">Collection &amp; Management</div>
                </div>
            </div>

            <nav>
                <div class="nav-section">Overview</div>
                <a href="/" class="nav-link{% if active == 'home' %} active{% endif %}">Dashboard</a>

                <div class="nav-section">Units</div>
                <a href="/apartments" class="nav-link{% if active == 'apartments' %} active{% endif %}">View Apartments</a>
                <a href="/admin" class="nav-link{% if active == 'admin' %} active{% endif %}">Add Apartment (Admin)</a>

                <div class="nav-section">Tenants</div>
                <a href="/tenants" class="nav-link{% if active == 'tenants' %} active{% endif %}">View Tenants</a>
                <a href="/add_tenant" class="nav-link{% if active == 'add_tenant' %} active{% endif %}">Add Tenant</a>

                <div class="nav-section">Payments</div>
                <a href="/payments" class="nav-link{% if active == 'payments' %} active{% endif %}">View Payments</a>
                <a href="/add_payment" class="nav-link{% if active == 'add_payment' %} active{% endif %}">Accept Payment</a>
            </nav>
        </aside>

        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
