{% extends "base.html" %}

{% block title %}Add Apartment — Apartment System{% endblock %}

{% block content %}
<header class="page-header">
    <h1>Add Apartment Unit</h1>
    <p>Register a new unit with monthly rent and occupancy status.</p>
</header>

<div class="panel" style="max-width: 480px;">
    <form method="POST">
        <div class="form-group">
            <label for="unit_number">Unit Number</label>
            <input type="text" id="unit_number" name="unit_number" required>
        </div>
        <div class="form-group">
            <label for="monthly_rent">Monthly Rent</label>
            <input type="number" id="monthly_rent" name="monthly_rent" step="0.01" min="0" required>
        </div>
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status">
                <option value="Vacant">Vacant</option>
                <option value="Occupied">Occupied</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Save Apartment</button>
    </form>
    <div class="actions-row">
        <a href="/" class="btn btn-secondary">Back to Home</a>
    </div>
</div>
{% endblock %}
